<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8">
    <title>Halaman Pertama Saya</title>
    <style>
body{
  background:linear-grandient(135deg,#667eea 0%,#764ba2 100%);
  display: flex;
  justify-content: center;
  align-item: center;
  min-height: 100vh;
  margin:0;
  font-family: Arial,sans-serif;
}

.box{
  background: white;
  padding: 50px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0,3);
}

h1{
  color:#667eea;
  font-size: 2.5em;
  margin: 0;
}

p{
  color:#666;
  font-size: 1.2em;
}

button{
  background: #51cf66;
        color: white;
        padding: 15px30px;
        font-size: 1em;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 20px;
}

button: hover{
  background: #40c057;
}
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Hello World!</h1>
      <p>Ini Adalah Halaman Pertama Saya Di GitHub!</p>
      <p id="message">Klik butang di bawah</p>
      <button onclick="sayHello()">Klik Saya</button>
    </div>

    <script>
      function sayHello(){
        document.getElementByld('message').InnerHTML='Selamat Datang!;
      }
    </script>
  </body>
</html>
